<section class="page-section">
    <div class="container">
        <h1 class="section-title">Contáctanos</h1>

        <div class="contact-container">
            <div id="form-feedback" class="form-feedback" aria-live="polite"></div>
            <form id="contact-form" action="/" method="POST">
                <input type="hidden" name="form-name" value="contacto">
                <div class="form-group">
                    <label for="contact-name">Nombre</label>
                    <input type="text" id="contact-name" name="name" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label for="contact-pet">Nombre de tu mascota</label>
                    <input type="text" id="contact-pet" name="pet" placeholder="Nombre de tu peludo">
                </div>
                <div class="form-group">
                    <label for="contact-phone">Teléfono</label>
                    <input type="tel" id="contact-phone" name="phone" placeholder="300 123 4567" required>
                </div>
                <div class="form-group">
                    <label for="contact-message">Mensaje</label>
                    <textarea id="contact-message" name="message" rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Enviar Mensaje</button>
            </form>

            <div style="margin-top: 3rem; text-align: center;">
                <h3>Visítanos</h3>
                <p>Cra 9 # 1n41 B/modelo, Popayán</p>
                <div style="margin-top: 1rem;">
                    <a href="https://instagram.com/Roberta_pet_shop" target="_blank" class="btn btn-outline">Síguenos en
                        Instagram</a>
                </div>
            </div>
        </div>
    </div>
</section>
