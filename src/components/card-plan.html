<article class="plan-card">
    <div class="plan-card__accent"></div>
    <h3 class="plan-card__name">{{name}}</h3>
    <p class="plan-card__focus">{{focus}}</p>
    <p class="plan-card__price">{{price}}</p>
    <ul class="plan-card__features">
        {{features}}
    </ul>
    <a href="https://wa.me/573225320613?text=Hola,%20quisiera%20agendar%20el%20plan%20{{name}}" target="_blank" rel="noopener" class="btn btn-primary plan-card__cta">Agendar por WhatsApp</a>
</article>
